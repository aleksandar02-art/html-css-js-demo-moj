<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body{
            font-family: Verdana, sans-serif;
            background: #fff9c9;
            padding:30px;
        }
        .container{
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.08);
        }
        img{
            width: 300px;
            border-radius: 10px;
            display: block;
        }
        h1{
            color: #d35400;
        }
        a{
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover{
            text-decoration: underline;
        }
        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th,td{
            padding: 10px;
            text-align: center;
        }
        th{
            background: #f39c12;
            text-align: center;
            color: white;
        }
        button{
            padding: 10px 15px;
            margin-top: 15px;
            border: none;
            background: #27ae60;
            color:white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover{
            background: #1e8449;
        }

    </style>
</head>
<body>
<div class="container">
    <h1>Moj omiljeni bend</h1>
    <img id="bandImage"
         alt="bandImage"
         src="https://static.wikia.nocookie.net/louistomlinson/images/7/76/1D_-_photoshoot.jpg/revision/latest?cb=20200705225357"
    >
    <p>
        Poseti njihovu <a href="https://www.youtube.com/watch?v=_kqQDCxRCzM&list=RD_kqQDCxRCzM&start_radio=1"
                          target="_blank">Youtube stranicu</a>
    </p>
    <h2>Top Pesme</h2>
    <table>
        <tr>
            <th>Redni broj</th>
            <th>Naziv pesme</th>
            <th>Ocena</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Summer nights</td>
            <td>10/10</td>
        </tr>
        <tr>
            <td>2</td>
            <td>You & I</td>
            <td>9/10</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Story of my life</td>
            <td>10/10</td>
        </tr>
    </table>
    <button onclick="promeniSliku()">Promeni Sliku</button>
</div>

<script>

    let firstPicture = true;
    function promeniSliku(){
         const img = document.getElementById("bandImage");
         if(firstPicture){
              img.src = "https://npr.brightspotcdn.com/dims4/default/34572d3/2147483647/strip/true/crop/5242x3930+0+0/resize/840x630!/format/webp/quality/90/?url=https%3A%2F%2Fmedia.npr.org%2Fassets%2Fimg%2F2012%2F12%2F08%2Fband-portrait-0edd9add934997f4002fed1a0c4d0e0881487902.jpg";
         }else{
              img.src = "https://static.wikia.nocookie.net/louistomlinson/images/7/76/1D_-_photoshoot.jpg/revision/latest?cb=20200705225357";
         }
         firstPicture = !firstPicture;

    }
</script>
</body>
</html>
